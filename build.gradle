plugins {
    id 'maven-publish'
}

// Replace with your actual group ID and version
group = 'com.nsenterprise.photoenhancer'
version = '1.0.3'

// JitPack runs the 'assemble' task by default. We create a dummy one so it doesn't fail.
task assemble {
    doLast {
        println "Dummy assemble task for JitPack"
    }
}

publishing {
    publications {
        release(MavenPublication) {
            groupId = 'com.nsenterprise.photoenhancer'
            artifactId = 'sdk' // This will be the name of your library
            version = '1.0.3'
            
            // Point this to your actual AAR file name
            artifact("photoenhancer-release.aar") {
                extension 'aar'
            }
        }
    }
}
